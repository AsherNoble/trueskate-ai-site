<section class="section" id="demo">
  <div class="container container--wide">
    <div class="section__head reveal">
      <span class="eyebrow">// 02 — DEMO</span>
      <h2 class="section__title">Watch it skate.</h2>
      <p class="muted mono demo__note">unedited agent rollouts.</p>
    </div>

    <div class="demo__strip reveal" data-reveal-delay="1" role="group" tabindex="0" aria-label="Trick demo clips — focus and use the arrow keys to scroll">
      <figure class="clip demo__clip" data-clip>
        <span class="corner-tag">TRK.01</span>
        <video class="clip__video" muted loop playsinline autoplay preload="metadata" aria-label="The agent performing a 360 flip">
          <source src="assets/demos/trick-01.mp4" type="video/mp4">
        </video>
        <div class="clip__placeholder">
          <span class="corner-tag">TRK.01</span>
          <span class="clip__pending">clip pending</span>
        </div>
        <figcaption class="clip__caption">360 flip</figcaption>
      </figure>

      <figure class="clip demo__clip" data-clip>
        <span class="corner-tag">TRK.02</span>
        <video class="clip__video" muted loop playsinline autoplay preload="metadata" aria-label="The agent performing a kickflip">
          <source src="assets/demos/trick-02.mp4" type="video/mp4">
        </video>
        <div class="clip__placeholder">
          <span class="corner-tag">TRK.02</span>
          <span class="clip__pending">clip pending</span>
        </div>
        <figcaption class="clip__caption">kickflip</figcaption>
      </figure>

      <figure class="clip demo__clip" data-clip>
        <span class="corner-tag">TRK.03</span>
        <video class="clip__video" muted loop playsinline autoplay preload="metadata" aria-label="The agent performing a heelflip">
          <source src="assets/demos/trick-03.mp4" type="video/mp4">
        </video>
        <div class="clip__placeholder">
          <span class="corner-tag">TRK.03</span>
          <span class="clip__pending">clip pending</span>
        </div>
        <figcaption class="clip__caption">heelflip</figcaption>
      </figure>

      <figure class="clip demo__clip" data-clip>
        <span class="corner-tag">TRK.04</span>
        <video class="clip__video" muted loop playsinline autoplay preload="metadata" aria-label="The agent performing a hardflip">
          <source src="assets/demos/trick-04.mp4" type="video/mp4">
        </video>
        <div class="clip__placeholder">
          <span class="corner-tag">TRK.04</span>
          <span class="clip__pending">clip pending</span>
        </div>
        <figcaption class="clip__caption">hardflip</figcaption>
      </figure>

      <figure class="clip demo__clip" data-clip>
        <span class="corner-tag">TRK.05</span>
        <video class="clip__video" muted loop playsinline autoplay preload="metadata" aria-label="The agent performing a varial flip">

          <span class="corner-tag">TRK.05</span>
          <span class="clip__pending">clip pending</span>
        </div>
        <figcaption class="clip__caption">varial flip</figcaption>
      </figure>

      <figure class="clip demo__clip" data-clip>
        <span class="corner-tag">TRK.06</span>
        <video class="clip__video" muted loop playsinline autoplay preload="metadata" aria-label="The agent performing a laser flip">
          <source src="assets/demos/trick-06.mp4" type="video/mp4">
        </video>
        <div class="clip__placeholder">
          <span class="corner-tag">TRK.06</span>
          <span class="clip__pending">clip pending</span>
        </div>
        <figcaption class="clip__caption">laser flip</figcaption>
      </figure>
    </div>
  </div>
</section>
