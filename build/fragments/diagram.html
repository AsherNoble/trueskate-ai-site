<svg id="diagram-compact" class="reveal" viewBox="0 0 920 360" role="img" aria-labelledby="diagram-compact-title" preserveAspectRatio="xMidYMid meet" focusable="false">
  <title id="diagram-compact-title">TrueSkate-AI control loop: iPhone, gesture, vision/OCR, reward, CMA-ES, back to iPhone.</title>

  <!-- ===== frame ticks / CAD chrome (matches the full print) ===== -->
  <g class="diagram-frame">
    <path class="diagram-tick" d="M16,16 h14 M16,16 v14" />
    <path class="diagram-tick" d="M904,16 h-14 M904,16 v14" />
    <path class="diagram-tick" d="M16,344 h14 M16,344 v-14" />
    <path class="diagram-tick" d="M904,344 h-14 M904,344 v-14" />
  </g>

  <!-- ===== connector edges (forward chain) ===== -->
  <g class="diagram-edges" fill="none">
    <!-- iPhone -> Gesture -->
    <polyline class="diagram-edge" points="178,108 226,108" marker-end="url(#dgc-arrow)" />
    <!-- Gesture -> Vision -->
    <polyline class="diagram-edge" points="404,108 452,108" marker-end="url(#dgc-arrow)" />
    <!-- Vision -> Reward -->
    <polyline class="diagram-edge" points="630,108 678,108" marker-end="url(#dgc-arrow)" />
    <!-- Reward -> Optimizer (drop down) -->
    <polyline class="diagram-edge" points="788,142 788,196 788,206" marker-end="url(#dgc-arrow)" />
    <!-- Optimizer -> iPhone (the closing return path; starts at the Optimizer
         box center so the pulse rides the wire for the whole return leg) -->
    <polyline class="diagram-edge diagram-edge--return" points="788,250 116,250 116,142" marker-end="url(#dgc-arrow)" />
  </g>

  <!-- ===== connector labels riding the lines ===== -->
  <g class="diagram-conn">
    <text x="202" y="98" text-anchor="middle">gesture</text>
    <text x="428" y="98" text-anchor="middle">frames</text>
    <text x="654" y="98" text-anchor="middle">trick name</text>
    <text x="804" y="178" text-anchor="start">reward</text>
    <text x="397" y="240" text-anchor="middle" class="diagram-conn--return">new gesture params</text>
  </g>

  <!-- ===== nodes ===== -->
  <!-- 1. iPhone -->
  <g class="diagram-node" data-node="n-device">
    <rect class="diagram-box" x="40" y="70" width="138" height="76" rx="6" />
    <text class="diagram-node-title" x="109" y="104" text-anchor="middle">iPhone</text>
    <text class="diagram-node-sub" x="109" y="124" text-anchor="middle">True Skate</text>
  </g>
  <!-- 2. Gesture -->
  <g class="diagram-node" data-node="n-gesture">
    <rect class="diagram-box" x="266" y="70" width="138" height="76" rx="6" />
    <text class="diagram-node-title" x="335" y="104" text-anchor="middle">Gesture</text>
    <text class="diagram-node-sub" x="335" y="124" text-anchor="middle">Appium / WDA &#8594; hand</text>
  </g>
  <!-- 3. Vision + OCR -->
  <g class="diagram-node" data-node="n-vision">
    <rect class="diagram-box" x="492" y="70" width="138" height="76" rx="6" />
    <text class="diagram-node-title" x="561" y="104" text-anchor="middle">Vision + OCR</text>
    <text class="diagram-node-sub" x="561" y="124" text-anchor="middle">Apple Vision</text>
  </g>
  <!-- 4. Reward -->
  <g class="diagram-node" data-node="n-reward">
    <rect class="diagram-box" x="718" y="70" width="138" height="76" rx="6" />
    <text class="diagram-node-title" x="787" y="104" text-anchor="middle">Reward</text>
    <text class="diagram-node-sub" x="787" y="124" text-anchor="middle">target-relative</text>
  </g>
  <!-- 5. Optimizer -->
  <g class="diagram-node" data-node="n-optim">
    <rect class="diagram-box" x="718" y="212" width="138" height="76" rx="6" />
    <text class="diagram-node-title" x="787" y="246" text-anchor="middle">Optimizer</text>
    <text class="diagram-node-sub" x="787" y="266" text-anchor="middle">CMA-ES</text>
  </g>

  <!-- ===== blue signal pulse (CSS offset-path traces the loop) ===== -->
  <circle class="diagram-pulse" r="4.5" cx="0" cy="0" />

  <!-- arrowhead marker -->
  <defs>
    <marker id="dgc-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path class="diagram-arrowhead" d="M1,1 L9,5 L1,9" fill="none" />
    </marker>
  </defs>
</svg>
